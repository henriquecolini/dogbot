services:
  db:
    image: postgres:16
    restart: unless-stopped
    container_name: dogbot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dogbot_data:/var/lib/postgresql/data

volumes:
  dogbot_data: