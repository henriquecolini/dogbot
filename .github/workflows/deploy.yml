name: Deploy
on:
  release:
    types: [ published ]

jobs:
  docker-amd64:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }}-amd64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache-amd64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache-amd64,mode=max

  docker-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }}-arm64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache-arm64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache-arm64,mode=max

  merge-manifest:
    runs-on: ubuntu-latest
    needs: [ docker-amd64, docker-arm64 ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }} \
            --tag ghcr.io/${{ github.repository_owner }}/dogbot:latest \
            ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }}-arm64