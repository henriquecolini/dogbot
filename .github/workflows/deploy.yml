name: Deploy
on:
  release:
    types: [ published ]
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/dogbot:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/dogbot:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dogbot:cache,mode=max